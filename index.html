<link rel="alternate" type="application/rss+xml" title="Караван идёт — рецензии и заметки" href="/rss.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --bg-2:#111114;
    --card:#15151a;
    --border:#26262e;
    --text:#ececf1;
    --muted:#b0b0be;          /* подняли контраст до WCAG AA */
    --muted-warm:#b3aa98;     /* тёплый приглушённый — для дат и подписей */
    --accent:#e8b84b;
    --accent-2:#c8423a;
    --maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Manrope",system-ui,sans-serif;line-height:1.65;
    -webkit-font-smoothing:antialiased;min-height:100vh;position:relative;
  }
  /* кинематографичный фон: приглушённое тёплое сияние сверху + мягкая виньетка.
     (Зерно плёнки убрано — меньше одновременных эффектов, чище картинка.) */
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:
      radial-gradient(900px 600px at 86% 2%, rgba(232,184,75,.15), transparent 60%),
      radial-gradient(820px 560px at 4% 4%, rgba(200,66,58,.09), transparent 58%),
      radial-gradient(1300px 1050px at 50% 42%, rgba(62,62,88,.18), transparent 72%),
      radial-gradient(165% 120% at 50% 38%, transparent 48%, rgba(0,0,0,.66) 100%),
      linear-gradient(180deg, #13131e 0%, #0c0c13 50%, #08080b 100%);
  }
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  main,.hero{animation:fadeUp .45s ease both}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}

  /* HEADER */
  header.site{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
    background:rgba(10,10,12,.80);border-bottom:1px solid var(--border)}
  .nav{max-width:var(--maxw);margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:20px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:44px;height:44px;border-radius:11px;display:block;object-fit:cover;
    border:1px solid var(--border);box-shadow:0 0 22px rgba(232,184,75,.16)}
  .brand .logo-fallback{width:42px;height:42px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;font-weight:800;color:#0a0a0c;font-size:22px}
  .brand .name{font-weight:800;letter-spacing:.16em;font-size:16px;white-space:nowrap}
  .brand .name span{color:var(--accent)}
  .menu{display:flex;gap:22px;flex-wrap:wrap;align-items:center}
  .menu a{color:var(--muted);font-size:14px;letter-spacing:.02em;
    transition:color .2s;position:relative;padding:2px 0}
  .menu a:hover,.menu a.active{color:var(--text)}
  .menu a.active::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:var(--accent)}
  .nav-toggle{display:none;background:none;border:1px solid var(--border);border-radius:9px;
    width:42px;height:38px;color:var(--text);cursor:pointer;font-size:18px;line-height:1}

  /* HERO — центрированный, спокойный, с киккером и слоганом */
  .hero{max-width:var(--maxw);margin:0 auto;padding:64px 24px 26px;text-align:center}
  .hero .kicker{color:var(--muted-warm);font-size:13px;letter-spacing:.26em;
    text-transform:uppercase;margin-bottom:20px}
  .hero h1{font-family:"Playfair Display",serif;font-size:clamp(34px,5.6vw,62px);
    font-weight:800;line-height:1.05;letter-spacing:-.01em;margin:0 auto;max-width:18ch}
  .hero h1 em{color:var(--accent);font-style:italic}
  .hero p{color:var(--muted);font-size:18px;margin:20px auto 0;max-width:58ch}

  /* LAYOUT */
  main{max-width:var(--maxw);margin:0 auto;padding:18px 24px 90px;min-height:46vh}
  .section-label{display:flex;align-items:center;gap:14px;margin:30px 0 24px;
    color:var(--muted);font-size:13px;letter-spacing:.18em;text-transform:uppercase}
  .section-label::after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg, rgba(232,184,75,.35), rgba(38,38,46,0))}
  .section-label a{color:var(--accent);text-transform:none;letter-spacing:.02em;
    font-size:13px;white-space:nowrap}
  .section-label a:hover{text-decoration:underline}
  .page-title{font-family:"Playfair Display",serif;font-size:clamp(28px,5vw,44px);
    font-weight:800;margin:8px 0 6px}
  .page-sub{color:var(--muted);font-size:16px;margin-bottom:24px;max-width:60ch}

  /* CARD GRID (reviews + collections) */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:26px}
  .grid.wide{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .card{background:linear-gradient(180deg,#1a1a22,#121217);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;cursor:pointer;color:inherit;
    transition:transform .25s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column;
    box-shadow:0 10px 26px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.05)}
  .card:hover{transform:translateY(-5px);border-color:#43434f;
    box-shadow:0 18px 40px rgba(0,0,0,.46), 0 0 0 1px rgba(232,184,75,.14), inset 0 1px 0 rgba(255,255,255,.06)}
  /* Постер в рамке киноплёнки: перфорация по краям в полях, картинка между ними.
     Пропорции заданы самой картинке, поэтому поля её не обрезают. */
  .poster{position:relative;overflow:hidden;padding:0 14px;background:#08080b}
  .poster img,.poster .ph{width:100%;aspect-ratio:2/3}
  .poster img{display:block;object-fit:cover}
  .poster.cover img,.poster.cover .ph{aspect-ratio:16/10}
  .poster::before,.poster::after{content:"";position:absolute;top:0;bottom:0;width:14px;z-index:2;
    pointer-events:none;
    background:repeating-linear-gradient(to bottom,
      #08080b 0 6px, rgba(255,255,255,.16) 6px 12px)}
  .poster::before{left:0}
  .poster::after{right:0}
  .poster .ph{display:grid;place-items:center;
    color:#6a6a78;font-family:"Playfair Display",serif;font-size:30px;text-align:center;
    padding:24px 34px;
    background:radial-gradient(120% 90% at 50% 0%, rgba(232,184,75,.06), transparent 55%),
      linear-gradient(160deg,#1b1b24,#0d0d12)}
  .rating-badge{position:absolute;top:12px;right:18px;z-index:3;background:rgba(10,10,12,.82);
    border:1px solid var(--border);color:var(--accent);font-weight:700;font-size:14px;
    padding:5px 10px;border-radius:20px;backdrop-filter:blur(4px)}
  .count-badge{position:absolute;bottom:12px;left:18px;z-index:3;background:rgba(10,10,12,.82);
    border:1px solid var(--border);color:var(--text);font-size:12px;
    padding:4px 10px;border-radius:20px;backdrop-filter:blur(4px)}
  .card-body{padding:16px 16px 18px}
  .card-body h3{font-size:17px;font-weight:700;line-height:1.3}
  .card-meta{color:var(--muted-warm);font-size:13px;margin-top:6px;letter-spacing:.01em}
  .card-excerpt{color:#c2c2cc;font-size:14px;margin-top:10px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-headline{font-family:"Playfair Display",Georgia,serif;font-style:italic;
    color:#cdc8bc;font-size:15px;line-height:1.38;margin-top:9px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  /* FEATURED — «выбор автора» на главной */
  .featured{display:flex;align-items:stretch;gap:0;margin:6px 0 16px;color:inherit;
    background:linear-gradient(180deg,#181820,#101015);border:1px solid var(--border);
    border-radius:16px;overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.42);transition:transform .25s,border-color .25s,box-shadow .25s}
  .featured:hover{transform:translateY(-4px);border-color:#43434f;
    box-shadow:0 22px 54px rgba(0,0,0,.5), 0 0 0 1px rgba(232,184,75,.16)}
  .featured-poster{position:relative;flex-shrink:0;width:210px;background:#0d0d12}
  .featured-poster img{width:100%;height:100%;object-fit:cover;display:block}
  .featured-poster .ph{width:100%;height:100%;min-height:300px;display:grid;place-items:center;
    color:#6a6a78;font-family:"Playfair Display",serif;font-size:26px;text-align:center;padding:24px;
    background:linear-gradient(160deg,#1b1b24,#0d0d12)}
  .featured-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:30px 34px}
  .featured-kicker{color:var(--accent);font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px}
  .featured-title{font-family:"Playfair Display",serif;font-size:clamp(24px,3.2vw,34px);font-weight:800;
    line-height:1.1;color:#fff}
  .featured-film{font-family:"Playfair Display",serif;color:#e7e2d6;font-size:18px;margin-top:10px}
  .featured-meta{color:var(--muted-warm);font-size:14px;margin-top:8px}
  .featured-excerpt{color:#c2c2cc;font-size:16px;line-height:1.6;margin-top:14px;max-width:62ch;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .featured-cta{color:var(--accent);font-size:15px;font-weight:600;margin-top:18px}
  @media(max-width:680px){
    .featured{flex-direction:column}
    .featured-poster{width:100%;height:260px}
    .featured-body{padding:22px 22px 26px}
  }

  /* FEED (timeline) */
  .feed-list{max-width:760px;margin:0 auto}
  .feed-item{display:block;padding:22px 24px;margin-bottom:14px;border:1px solid var(--border);
    border-radius:13px;color:inherit;
    background:linear-gradient(180deg,#16161c,#111116);
    box-shadow:0 8px 22px rgba(0,0,0,.30);cursor:pointer;
    transition:transform .2s,border-color .2s,box-shadow .2s}
  .feed-item:hover{transform:translateY(-3px);border-color:#43434f;
    box-shadow:0 14px 32px rgba(0,0,0,.42), 0 0 0 1px rgba(232,184,75,.10)}
  .feed-item.has-img{display:flex;gap:22px;align-items:stretch;padding:18px 20px}
  .feed-item .feed-thumb{flex-shrink:0;width:200px;border-radius:10px;overflow:hidden;
    border:1px solid var(--border);background:#0d0d12}
  .feed-item .feed-thumb img{width:100%;height:100%;object-fit:cover;min-height:140px}
  .feed-item .feed-main{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  @media(max-width:560px){
    .feed-item.has-img{flex-direction:column;gap:14px}
    .feed-item .feed-thumb{width:100%;aspect-ratio:16/9}
  }
  .feed-date{color:var(--muted-warm);font-size:13px;letter-spacing:.08em;text-transform:uppercase}
  .feed-item h3{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;margin:8px 0}
  .feed-item .feed-tag{display:inline-block;border:1px solid var(--border);color:var(--muted);
    font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.04em}
  .feed-item p{color:#c2c2cc;font-size:15px}
  .feed-item .more{color:var(--accent);font-size:14px;margin-top:10px;display:inline-block}

  /* PRESS */
  .press-layout{display:flex;gap:36px;align-items:flex-start;max-width:980px;margin:0 auto}
  .press-nav{position:sticky;top:78px;flex-shrink:0;width:190px;display:flex;flex-direction:column;gap:3px}
  .press-nav a{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:14px;
    padding:8px 12px;border-radius:9px;border-left:2px solid transparent;cursor:pointer;transition:.2s}
  .press-nav a:hover,.press-nav a.active{color:var(--text);background:var(--bg-2);border-left-color:var(--accent)}
  .press-nav a span{color:var(--muted);font-size:12px}
  .press-body{flex:1;min-width:0}
  .press-list{display:flex;flex-direction:column;gap:14px}
  .press-item{display:flex;align-items:stretch;gap:18px;color:inherit;
    background:linear-gradient(180deg,#191920,#121217);
    border:1px solid var(--border);border-radius:13px;padding:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.32);
    transition:transform .2s,border-color .2s,box-shadow .2s}
  .press-item:hover{transform:translateY(-3px);border-color:#46464f;
    box-shadow:0 14px 32px rgba(0,0,0,.44), 0 0 0 1px rgba(232,184,75,.12)}
  .press-thumb{position:relative;width:124px;flex-shrink:0;aspect-ratio:16/10;
    border-radius:9px;overflow:hidden;border:1px solid var(--border);
    background:radial-gradient(120% 90% at 50% 0%,rgba(232,184,75,.08),transparent 55%),linear-gradient(160deg,#1d1d26,#0d0d12)}
  .press-thumb img{width:100%;height:100%;object-fit:cover}
  .press-ext{position:absolute;top:7px;left:7px;width:24px;height:24px;border-radius:7px;
    background:rgba(10,10,12,.82);border:1px solid var(--border);color:var(--accent);
    display:grid;place-items:center;font-size:14px;backdrop-filter:blur(3px)}
  /* Заголовок фестиваля: название Playfair + золотой разделитель, при наличии — логотип */
  .fest-head{display:flex;align-items:center;gap:14px;margin:40px 0 22px;padding:0 0 15px;
    border-bottom:1px solid rgba(232,184,75,.26)}
  .fest-head:first-child{margin-top:8px}
  .fest-name{font-family:"Playfair Display",serif;font-size:clamp(21px,2.6vw,27px);font-weight:700;
    color:#fff;line-height:1.12}
  .fest-emblem{flex-shrink:0;display:grid;place-items:center;height:42px}
  .fest-logo{height:42px;width:auto;max-width:160px;display:block}
  .fest-logo.gold{width:130px;background:var(--accent);
    -webkit-mask:var(--logo) left center/contain no-repeat;mask:var(--logo) left center/contain no-repeat}
  .press-main{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .press-outlet{color:var(--muted-warm);font-weight:700;font-size:12px;letter-spacing:.05em;
    text-transform:uppercase;margin-bottom:5px}
  .press-main h3{font-size:16px;font-weight:700;line-height:1.35}
  .press-main .press-meta{color:var(--muted);font-size:13px;margin-top:5px}
  @media(max-width:760px){
    .press-layout{flex-direction:column;gap:16px}
    .press-nav{position:static;flex-direction:row;flex-wrap:wrap;width:auto;gap:8px}
    .press-nav a{border-left:0;border:1px solid var(--border);border-radius:20px;padding:6px 12px}
    .press-nav a span{display:none}
  }
  @media(max-width:560px){.press-thumb{width:92px}}

  /* DETAIL PAGES */
  .review-wrap,.about-wrap{max-width:760px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);
    font-size:14px;margin-bottom:30px;transition:color .2s}
  .back:hover{color:var(--accent)}
  .review-head{display:flex;align-items:flex-start;gap:28px;margin-bottom:30px;flex-wrap:wrap}
  .review-head .poster-col{flex-shrink:0;width:180px}
  /* На странице рецензии постер показываем целиком, без киноплёнки по краям. */
  .review-head .poster{width:100%;border-radius:12px;border:1px solid var(--border);
    padding:0;overflow:hidden;background:linear-gradient(160deg,#1d1d26,#0e0e12)}
  .review-head .poster::before,.review-head .poster::after{display:none}
  .review-head .info{flex:1;min-width:240px}
  .review-head h1{font-family:"Playfair Display",serif;font-size:clamp(25px,4.2vw,36px);
    font-weight:800;line-height:1.14}
  .review-head .sub{color:var(--muted-warm);margin-top:11px;font-size:15.5px;letter-spacing:.02em}
  /* заголовок-рубрика статьи: между шапкой и текстом, ведёт в тело рецензии */
  .review-headline{font-family:"Playfair Display",serif;font-weight:800;
    font-size:clamp(24px,3.6vw,34px);line-height:1.14;color:#fff;margin:6px 0 26px}
  .stars{margin-top:18px;font-size:19px;letter-spacing:2px;line-height:1.4}
  .stars .st-full{color:var(--accent)}
  .stars .st-empty{color:#3a3a46}
  .stars .st-half{position:relative;color:#3a3a46}
  .stars .st-half::before{content:"★";position:absolute;left:0;top:0;width:50%;overflow:hidden;color:var(--accent)}
  .stars .num{color:var(--muted);font-size:14px;letter-spacing:0;margin-left:10px}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .pill{border:1px solid var(--border);color:var(--muted);font-size:12px;
    padding:5px 12px;border-radius:20px;letter-spacing:.03em}
  .fest-badge{display:inline-block;margin-top:16px;background:rgba(232,184,75,.12);
    border:1px solid rgba(232,184,75,.42);color:var(--accent);font-weight:700;font-size:13px;
    padding:8px 15px;border-radius:20px;cursor:pointer;letter-spacing:.02em;transition:.2s}
  .fest-badge:hover{background:rgba(232,184,75,.22)}
  /* бейдж «открыть на Letterboxd» */
  .ext-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
  .ext{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;
    padding:8px 15px;border-radius:11px;border:1px solid var(--border);color:var(--text);
    background:linear-gradient(180deg,#17171d,#121217);
    box-shadow:0 6px 16px rgba(0,0,0,.3);transition:border-color .2s,transform .2s,color .2s}
  .ext .ico{flex-shrink:0;display:block}
  .ext .ico-lb{height:11px;width:auto}
  .ext .arr{color:var(--muted);font-size:12px}
  .ext:hover{transform:translateY(-2px)}
  .ext.lb:hover{border-color:#00e054;color:#fff}
  .search{width:100%;max-width:440px;margin:0 0 26px;padding:11px 16px;border-radius:11px;
    border:1px solid var(--border);background:var(--bg-2);color:var(--text);font-size:15px;font-family:inherit}
  .search:focus{outline:none;border-color:var(--accent)}
  .search::placeholder{color:var(--muted)}

  /* ABOUT */
  .about-hero{display:flex;gap:30px;align-items:flex-start;margin-bottom:40px;flex-wrap:wrap}
  .about-hero .photo{width:220px;border-radius:16px;flex-shrink:0;overflow:hidden;
    border:1px solid var(--border);background:linear-gradient(160deg,#1d1d26,#0e0e12);
    display:grid;place-items:center;color:#33333f;font-family:"Playfair Display",serif;font-size:64px;
    aspect-ratio:4/5}
  .about-hero .photo img{width:100%;height:100%;object-fit:cover}
  .about-hero .who{flex:1;min-width:240px}
  .about-hero h1{font-family:"Playfair Display",serif;font-size:clamp(28px,5vw,44px);
    font-weight:800;line-height:1.08}
  .about-hero .role{color:var(--accent);margin-top:12px;font-size:15px;letter-spacing:.04em}
  .about-hero .socials{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
  .about-hero .socials a{display:inline-flex;align-items:center;gap:6px;
    border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;
    padding:8px 15px;border-radius:22px;background:linear-gradient(180deg,#17171d,#121217);

  /* PROSE */
  article.prose,.prose{font-size:17px;color:#dadae2}
  /* лид-абзац: крупнее и светлее, но БЕЗ курсива — длинный курсив утомляет */
  .prose > p:first-of-type{font-size:19px;line-height:1.6;color:#ede9e0;
    font-weight:500;margin:0 0 26px;letter-spacing:.002em}
  .prose h2{font-family:"Playfair Display",serif;font-size:26px;margin:36px 0 14px;color:#fff}
  .prose h3{font-size:20px;margin:28px 0 12px}
  .prose p{margin:0 0 20px}
  .prose blockquote{border-left:3px solid var(--accent);padding:6px 0 6px 22px;margin:24px 0;
    color:#fff;font-family:"Playfair Display",serif;font-style:italic;font-size:21px}
  /* Выносная цитата (pull quote): акцент, вытащенный из текста. Центр, без рамки,
     с тонкими золотыми штрихами — отличается от обычной цитаты с источником. */
  .prose blockquote.pullquote{border:none;padding:0;max-width:34ch;margin:38px auto;
    text-align:center;font-family:"Playfair Display",serif;font-style:italic;font-weight:600;
    font-size:clamp(22px,3vw,28px);line-height:1.32;color:#f1ead8}
  .prose blockquote.pullquote::before,.prose blockquote.pullquote::after{content:"";display:block;
    width:48px;height:2px;margin:0 auto;
    background:linear-gradient(90deg,transparent,var(--accent),transparent)}
  .prose blockquote.pullquote::before{margin-bottom:20px}
  .prose blockquote.pullquote::after{margin-top:20px}
  .prose blockquote.pullquote p{margin:0}
  .prose a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
  .prose ul,.prose ol{margin:0 0 20px 22px}
  .prose li{margin:6px 0}
  .prose img{border-radius:12px;margin:24px auto;display:block;border:1px solid var(--border)}
  .prose hr{border:none;border-top:1px solid var(--border);margin:36px 0}
  .prose code{background:var(--bg-2);padding:2px 7px;border-radius:5px;font-size:15px}

  /* COLLECTION entries (рендерятся внутри .prose) */
  .coll-entry{display:flex;gap:22px;align-items:flex-start;padding:26px 0;border-bottom:1px solid var(--border)}
  .coll-entry:last-child{border-bottom:none}
  .coll-rank{font-family:"Playfair Display",serif;font-size:30px;font-weight:800;color:var(--accent);
    opacity:.7;min-width:42px;line-height:1.05}
  .coll-entry .coll-poster{width:124px;flex-shrink:0;border-radius:10px;border:1px solid var(--border);margin:0}
  .coll-body{flex:1;min-width:0}
  .coll-body h3{font-family:"Playfair Display",serif;font-size:21px;font-weight:700;line-height:1.2;color:#fff;margin:0}
  .coll-film{font-family:"Playfair Display",serif;font-style:italic;color:var(--accent);font-size:16px;margin-top:4px}
  .coll-meta{color:var(--muted);font-size:13px;margin:7px 0 11px}
  .coll-meta b{color:var(--accent);font-weight:700}
  .coll-body p{color:#cccdd6;font-size:15px;line-height:1.62;margin:0}
  @media(max-width:560px){.coll-entry{gap:14px}.coll-entry .coll-poster{width:92px}.coll-rank{font-size:23px;min-width:30px}}

  /* ============ СКРОЛЛ-ИСТОРИЯ (подборка, layout: scrolly) ============ */
  /* мягкий «доводчик» к сценам — не ловушка, можно прокручивать свободно */
  html.scrolly-lock{scroll-snap-type:y proximity;scroll-padding-top:64px}
  /* без fadeUp: его transform (fill:both) сделал бы main контейнером для
     position:fixed, и счётчик/кнопка «назад» поехали бы вместе со страницей */
  main.scrolly{max-width:none;margin:0;padding:0;min-height:100vh;animation:none}
  .scrolly-back{position:fixed;top:74px;left:max(18px,4vw);z-index:40;display:inline-flex;
    align-items:center;gap:8px;color:#cfcabf;font-size:14px;padding:8px 14px;border-radius:30px;
    background:rgba(12,12,16,.55);border:1px solid var(--border);backdrop-filter:blur(8px);transition:color .2s,border-color .2s}
  .scrolly-back:hover{color:var(--accent);border-color:#43434f}

  /* интро-сцена */
  .scene-intro{min-height:100vh;display:grid;place-items:center;text-align:center;
    padding:90px 6vw;scroll-snap-align:start;position:relative}
  .scene-intro-inner{max-width:780px}
  .scrolly-kicker{color:var(--accent);font-size:13px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px}
  .scrolly-title{font-family:"Playfair Display",serif;font-weight:800;color:#fff;
    font-size:clamp(34px,6.4vw,68px);line-height:1.04;letter-spacing:-.01em}
  .scrolly-sub{color:#c8c3b8;font-size:clamp(16px,2vw,21px);line-height:1.5;margin:26px auto 0;max-width:620px}
  .scroll-hint{margin-top:54px;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;

  .scroll-hint i{width:1px;height:46px;background:linear-gradient(var(--accent),transparent);animation:scrollPulse 1.9s ease-in-out infinite}
  @keyframes scrollPulse{0%,100%{opacity:.25;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}

  /* каждая запись подборки → сцена на весь экран */
  .scrolly .scrolly-body{margin:0}
  /* вводный абзац подборки — отдельная центрированная «сцена-эпиграф» */
  .scrolly-body>p:first-child{min-height:90vh;display:grid;place-items:center;margin:0;
    padding:80px 6vw;text-align:center;font-family:"Playfair Display",serif;font-style:italic;

  .scrolly .coll-entry{position:relative;min-height:100vh;display:flex;align-items:center;

  /* размытый постер-фон (--bg ставит JS из src постера) */
  .scrolly .coll-entry::before{content:"";position:absolute;inset:0;z-index:0;
    background:var(--bg,#0d0d12) center/cover no-repeat;transform:scale(1.25);
    filter:blur(46px) brightness(.30) saturate(1.2)}
  .scrolly .coll-entry::after{content:"";position:absolute;inset:0;z-index:0;
    background:radial-gradient(120% 90% at 50% 30%,transparent,rgba(7,7,10,.72) 70%),linear-gradient(180deg,rgba(7,7,10,.55),rgba(7,7,10,.85))}
  /* гигантский «призрачный» номер */
  .scrolly .coll-rank{position:absolute;z-index:0;top:50%;left:3vw;transform:translateY(-50%);
    font-size:42vh;line-height:1;opacity:.07;color:#fff;pointer-events:none;min-width:0}
  /* постер крупным планом */
  .scrolly .coll-entry .coll-poster{position:relative;z-index:1;width:clamp(180px,24vw,320px);
    border-radius:16px;border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .scrolly .coll-body{position:relative;z-index:1;flex:1;max-width:560px}
  .scrolly .coll-body h3{font-family:"Playfair Display",serif;font-size:clamp(28px,4vw,46px);
    font-weight:800;color:#fff;line-height:1.06;margin:0}
  /* название фильма — прямо под именем героини */
  .scrolly .coll-film{font-family:"Playfair Display",serif;font-style:italic;color:var(--accent);
    font-size:clamp(18px,2.2vw,27px);line-height:1.2;margin-top:11px}
  .scrolly .coll-meta{color:#dcd7cc;font-size:clamp(15px,1.8vw,19px);margin:13px 0 22px}
  .scrolly .coll-meta b{color:var(--accent)}
  .scrolly .coll-body p{color:#e4e4ea;font-size:clamp(15px,1.7vw,19px);line-height:1.66}
  /* чётные сцены — зеркально, для ритма */
  .scrolly .coll-entry:nth-of-type(even){flex-direction:row-reverse}
  .scrolly .coll-entry:nth-of-type(even) .coll-rank{left:auto;right:3vw}
  /* появление при прокрутке (класс .in ставит IntersectionObserver) */
  .scrolly .coll-entry .coll-poster,.scrolly .coll-entry .coll-body{
    opacity:0;transform:translateY(46px);transition:opacity .9s ease,transform .9s cubic-bezier(.2,.7,.2,1)}
  .scrolly .coll-entry.in .coll-poster{opacity:1;transform:none}
  .scrolly .coll-entry.in .coll-body{opacity:1;transform:none;transition-delay:.12s}
  /* счётчик сцен */
  .scrolly-counter{position:fixed;right:max(18px,4vw);bottom:30px;z-index:40;
    font-family:"Playfair Display",serif;color:#fff;background:rgba(12,12,16,.5);
    border:1px solid var(--border);backdrop-filter:blur(8px);padding:8px 16px;border-radius:30px;
    display:flex;align-items:baseline;gap:5px}
  .scrolly-counter b{font-size:22px;font-weight:800;color:var(--accent)}
  .scrolly-counter i{font-style:normal;font-size:13px;color:var(--muted)}
  @media(max-width:680px){
    .scrolly .coll-entry{flex-direction:column;text-align:center;justify-content:center;gap:22px;padding:90px 22px}
    .scrolly .coll-entry:nth-of-type(even){flex-direction:column}

  @media(prefers-reduced-motion:reduce){

<!-- VIEW_FLAG -->
<script src="/assets/marked.min.js"></script>
<script type="module">
import * as R from '/assets/render.js';

document.getElementById('year').textContent = new Date().getFullYear();
const app = document.getElementById('app');
const navLinks = document.querySelectorAll('.menu a[data-nav]');
const menu = document.getElementById('menu');
const navToggle = document.getElementById('navToggle');

function setActive(which){ navLinks.forEach(a=>a.classList.toggle('active', a.dataset.nav===which)); }
const md = s => (window.marked ? window.marked.parse(s) : s);
async function getJSON(p){ const r=await fetch(p); if(!r.ok) throw new Error(p); return r.json(); }
async function getText(p){ const r=await fetch(p); if(!r.ok) throw new Error(p); return r.text(); }
function setApp(html){ app.innerHTML = html; }
function loading(){ setApp(`<main><div class="state">Загрузка…</div></main>`); }
const setTitle = t => { document.title = t; };

/* мобильное меню */
navToggle.addEventListener('click', ()=>{
  const open = menu.classList.toggle('open');
  navToggle.setAttribute('aria-expanded', open?'true':'false');
});

/* ---------- рендереры (фетч + сборка из общего модуля R) ---------- */
async function renderHome(){
  setActive('home'); loading();
  const [reviews,feed,festivals,collections,press,site] = await Promise.all([
    getJSON('/reviews/manifest.json').catch(()=>null),
    getJSON('/feed/manifest.json').catch(()=>null),
    getJSON('/festivals/manifest.json').catch(()=>null),
    getJSON('/collections/manifest.json').catch(()=>null),
    getJSON('/press.json').catch(()=>null),
    getJSON('/site.json').catch(()=>null)
  ]);
  if([reviews,feed,festivals,collections,press].every(x=>x===null)){ setApp(R.loadError()); return; }
  setApp(R.homeView({reviews,feed,festivals,collections,press,site}));
  setTitle('Караван идёт — авторский сайт о кино Карена Аванесяна');
}

async function renderReviews(){
  setActive('reviews'); loading();
  try{
    const list = await getJSON('/reviews/manifest.json');
    setApp(R.reviewsView(list));
    wireReviewSearch(list);
    setTitle('Рецензии — Караван идёт');
  }catch(e){ setApp(R.loadError()); }
}
function wireReviewSearch(list){
  const inp = document.getElementById('revSearch');
  const grid = document.getElementById('grid');
  if(!inp||!grid) return;
  const pub = R.published(list);
  inp.addEventListener('input', ()=>{
    const q = inp.value.trim().toLowerCase();
    const items = pub.filter(r => !q || [r.film,r.title,r.original,r.director,r.year].filter(Boolean).join(' ').toLowerCase().includes(q));
    grid.innerHTML = items.length ? items.map(R.reviewCardHTML).join('') : `<div class="state">Ничего не найдено.</div>`;
  });
}

async function renderReview(slug){
  setActive('reviews'); loading();
  try{
    const {meta,body} = R.parseFrontMatter(await getText(`/reviews/${slug}.md`));
    setApp(R.reviewPageView(meta, md(body)));
    setTitle(`${meta.title||meta.film||'Рецензия'}${meta.film&&meta.film!==meta.title?' — '+meta.film:''} — Караван идёт`);
    window.scrollTo(0,0);
  }catch(e){ setApp(R.notFoundView('Рецензия не найдена','/reviews','ко всем рецензиям')); }
}

async function renderCollections(){
  setActive('collections'); loading();
  try{ setApp(R.collectionsView(await getJSON('/collections/manifest.json'))); setTitle('Подборки — Караван идёт'); }
  catch(e){ setApp(R.loadError()); }
}
async function renderCollection(slug){
  setActive('collections'); loading();
  try{
    const {meta,body} = R.parseFrontMatter(await getText(`/collections/${slug}.md`));
    setApp(R.collectionPageView(meta, md(body)));
    setTitle(`${meta.title||'Подборка'} — Подборки — Караван идёт`);
    window.scrollTo(0,0);
    enhanceScrolly();
  }catch(e){ setApp(R.notFoundView('Подборка не найдена','/collections','к подборкам')); }
}

async function renderFeed(){
  setActive('feed'); loading();
  try{ setApp(R.feedView(await getJSON('/feed/manifest.json'))); setTitle('Заметки — Караван идёт'); }
  catch(e){ setApp(R.loadError()); }
}

async function renderPress(){
  setActive('press'); loading();
  try{ setApp(R.pressView(await getJSON('/press.json'))); setTitle('Публикации в СМИ — Караван идёт'); }
  catch(e){ setApp(R.loadError()); }
}

async function renderFestivals(){
  setActive('festivals'); loading();
  const [reviews,feed,diaries,press] = await Promise.all([
    getJSON('/reviews/manifest.json').catch(()=>[]),
    getJSON('/feed/manifest.json').catch(()=>[]),
    getJSON('/festivals/manifest.json').catch(()=>[]),
    getJSON('/press.json').catch(()=>[])
  ]);
  setApp(R.festivalsView({reviews,feed,diaries,press}));
  setTitle('Кинофестивали — Караван идёт');
}

async function renderTimelineItem(folder, slug, navKey, backHref, backLabel){
  setActive(navKey); loading();
  try{
    const {meta,body} = R.parseFrontMatter(await getText(`/${folder}/${slug}.md`));
    setApp(R.timelineItemView(meta, md(body), backHref, backLabel));
    setTitle(`${meta.title||'Запись'} — Караван идёт`);
    window.scrollTo(0,0);
  }catch(e){ setApp(R.notFoundView('Запись не найдена',backHref,backLabel)); }
}

async function renderAbout(){
  setActive('about'); loading();
  try{
    const {meta,body} = R.parseFrontMatter(await getText('/about.md'));
    setApp(R.aboutView(meta, md(body)));
    setTitle('Обо мне — Карен Аванесян — Караван идёт');
    window.scrollTo(0,0);
  }catch(e){ setApp(R.loadError()); }
}

/* ---------- скролл-история подборки ---------- */
let scrollyIO = null, scrollyScroll = null;
function teardownScrolly(){
  document.documentElement.classList.remove('scrolly-lock');
  if(scrollyIO){ scrollyIO.disconnect(); scrollyIO = null; }
  if(scrollyScroll){ window.removeEventListener('scroll', scrollyScroll); scrollyScroll = null; }
}
function enhanceScrolly(){
  const root = document.querySelector('.scrolly');
  if(!root){ teardownScrolly(); return; }
  document.documentElement.classList.add('scrolly-lock');
  const scenes = [...root.querySelectorAll('.coll-entry')];
  const now = document.getElementById('scNow');
  scenes.forEach((s,i)=>{
    s.classList.add('scene');
    s.dataset.idx = i+1;
    const img = s.querySelector('.coll-poster');
    const src = img && img.getAttribute('src');
    if(src) s.style.setProperty('--bg', `url("${src}")`);
  });
  /* появление сцен — через IntersectionObserver */
  if(scrollyIO) scrollyIO.disconnect();
  scrollyIO = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
  }, {threshold:0.15});
  scenes.forEach(s=>scrollyIO.observe(s));
  /* счётчик — напрямую от позиции прокрутки: берём сцену, чей центр ближе
     всего к центру экрана. Надёжнее IO для высоких сцен и обновляется на
     каждом кадре прокрутки, поэтому номер меняется на КАЖДОМ фильме. */
  let ticking = false;
  const updateCounter = ()=>{
    ticking = false;
    if(!now) return;
    const mid = window.innerHeight/2;
    let best=null, bd=Infinity;
    scenes.forEach(s=>{
      const r = s.getBoundingClientRect();
      const d = Math.abs(r.top + r.height/2 - mid);
      if(d<bd){ bd=d; best=s; }
    });
    if(best) now.textContent = best.dataset.idx;
  };
  if(scrollyScroll) window.removeEventListener('scroll', scrollyScroll);
  scrollyScroll = ()=>{ if(!ticking){ ticking = true; requestAnimationFrame(updateCounter); } };
  window.addEventListener('scroll', scrollyScroll, {passive:true});
  updateCounter();
}

/* ---------- роутер на реальных путях ---------- */
function route(){
  /* уходя с любой страницы — снимаем режим скролл-истории */
  teardownScrolly();
  const path = location.pathname.replace(/\/+$/,'') || '/';
  let m;
  if(m=path.match(/^\/review\/(.+)$/)) return renderReview(decodeURIComponent(m[1]));
  if(path==='/reviews') return renderReviews();
  if(m=path.match(/^\/collection\/(.+)$/)) return renderCollection(decodeURIComponent(m[1]));
  if(path==='/collections') return renderCollections();
  if(m=path.match(/^\/festival\/(.+)$/)) return renderTimelineItem('festivals',decodeURIComponent(m[1]),'festivals','/festivals','к фестивалям');
  if(path==='/festivals') return renderFestivals();
  if(m=path.match(/^\/feed\/(.+)$/)) return renderTimelineItem('feed',decodeURIComponent(m[1]),'feed','/feed','в заметки');
  if(path==='/feed') return renderFeed();
  if(path==='/press') return renderPress();
  if(path==='/about') return renderAbout();
  return renderHome();
}

function navTo(path){
  if(path === location.pathname) { window.scrollTo(0,0); return; }
  history.pushState({}, '', path);
  menu.classList.remove('open'); navToggle.setAttribute('aria-expanded','false');
  route();
}

/* перехват кликов по внутренним ссылкам → SPA-навигация */
document.addEventListener('click', e=>{
  if(e.defaultPrevented || e.button!==0 || e.metaKey||e.ctrlKey||e.shiftKey||e.altKey) return;
  const a = e.target.closest('a');
  if(!a) return;
  const href = a.getAttribute('href');
  if(!href || a.target==='_blank' || a.hasAttribute('download')) return;
  if(/^(https?:|mailto:|tel:)/.test(href)) return;
  if(href.startsWith('#')){
    /* внутренние якоря (рубрики прессы, фестивали). id содержит кириллицу,
       а нативный переход по #хэшу её процент-кодирует и не находит элемент —
       поэтому скроллим сами по раскодированному id. */
    const el = document.getElementById(decodeURIComponent(href.slice(1)));
    if(el){ e.preventDefault(); el.scrollIntoView({behavior:'smooth'}); history.replaceState({}, '', location.pathname + href); }
    return;
  }
  e.preventDefault();
  navTo(href);
});
window.addEventListener('popstate', route);

/* ---------- инициализация ---------- */
(function init(){
  /* совместимость со старыми ссылками вида #/review/slug */
  if(location.hash.startsWith('#/')){
    history.replaceState({}, '', location.hash.slice(1));
    route();
    return;
  }
  /* страница пререндерена сборщиком: контент уже в DOM — не перерисовываем,
     только подсвечиваем меню и довешиваем интерактив */
  if(window.__VIEW__){
    const v = window.__VIEW__;
    setActive(v.nav||'home');
    if(v.view==='reviews'){
      getJSON('/reviews/manifest.json').then(wireReviewSearch).catch(()=>{});
    }
    enhanceScrolly(); /* пререндеренная скролл-подборка — довешиваем фон/анимации */
    return;
  }
  route();
})();
</script>
